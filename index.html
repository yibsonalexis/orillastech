<!DOCTYPE html>
<html lang="en">
  <head>
    <title>formulario de contacto</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
<form action="Gracias.html" method="post">
      <h2>Contáctanos</h2>

      <label for="nombre">Nombre Completo:</label>
      <input type="text" id="nombre" name="nombre" required>

        <label for="teleono">Telefono:</label>
        <input type="text" id="telefono" name="telefono" required>

      <label for="correo">Correo Electronico:</label>
      <input type="email" id="correo" name="correo" required>

      <label for="motivo">Motivo:</label>
      <input type="text" id="motivo" name="motivo" required>

      <label for="mensaje">Mensaje para la fundacion:</label>
      <textarea name="mensaje" id="mensaje" rows="4"></textarea>

      <button type="submit">ENVIAR</button>
      <p id="confirmacion" class="oculto">¡Mensaje enviado correctamente!</p>

      <div class="redes">
        <a href="https://wa.me/573116445228" target="_blank">Contactar por WhatsApp</a>
      </div>
    </form>

    </body>
</html>
